plugins {
    id 'java'
}

group = 'com.biobam'
version = '1.0.0'
sourceCompatibility = '1.8'
targetCompatibility = '1.8'

repositories {
    mavenCentral()
}

dependencies {
    // JUnit 5
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.9.2'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.9.2'
    
    // JSII Runtime
    implementation 'software.amazon.jsii:jsii-runtime:1.112.0'
    
    // Our generated wdk-lib JAR
    implementation files('../dist/java/com/biobam/wdk-lib/0.0.0/wdk-lib-0.0.0.jar')
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
    }
}

// Ensure tests can find our JAR
test.classpath += files('../dist/java/com/biobam/wdk-lib/0.0.0/wdk-lib-0.0.0.jar')
