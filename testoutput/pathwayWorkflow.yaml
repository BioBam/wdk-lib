class: Workflow
cwlVersion: v1.2
inputs:
  input_file:
    id: input_file
    type: File
  input_expression:
    id: input_expression
    type:
      - 'null'
      - File
  output_project:
    id: output_project
    type: string
  output_report:
    id: output_report
    type:
      - 'null'
      - string
  reactome_enable:
    id: reactome_enable
    type: boolean
  gramene_enable:
    id: gramene_enable
    type: boolean
  kegg_enable:
    id: kegg_enable
    type: boolean
  reactome_annotation_linking:
    id: reactome_annotation_linking
    type: boolean
  gramene_annotation_linking:
    id: gramene_annotation_linking
    type: boolean
  kegg_annotation_linking:
    id: kegg_annotation_linking
    type: boolean
  reactome_sequence_linking:
    id: reactome_sequence_linking
    type: boolean
  gramene_sequence_linking:
    id: gramene_sequence_linking
    type: boolean
  kegg_sequence_linking:
    id: kegg_sequence_linking
    type: boolean
  reactome_blast_evalue:
    id: reactome_blast_evalue
    type: float
  gramene_blast_evalue:
    id: gramene_blast_evalue
    type: float
  reactome_most_specific:
    id: reactome_most_specific
    type: boolean
  gramene_most_specific:
    id: gramene_most_specific
    type: boolean
  reactome_prioritize_species:
    id: reactome_prioritize_species
    type: boolean
  gramene_prioritize_species:
    id: gramene_prioritize_species
    type: boolean
  reactome_priority_species:
    id: reactome_priority_species
    type: string
  reactome_priority_species_taxid:
    id: reactome_priority_species_taxid
    type: int
  gramene_priority_species:
    id: gramene_priority_species
    type: string
  gramene_priority_species_taxid:
    id: gramene_priority_species_taxid
    type: int
  reactome_categories:
    id: reactome_categories
    type:
      items: string
      type: array
  gramene_categories:
    id: gramene_categories
    type:
      items: string
      type: array
  kegg_categories:
    id: kegg_categories
    type:
      items: string
      type: array
outputs:
  - id: pathways_project
    type: File
    outputSource: pathway-analysis-service/output_project
  - id: output_project_file
    type: File
    outputSource: pathway-analysis-post/output_full_project
requirements:
  InlineJavascriptRequirement: {}
  SubworkflowFeatureRequirement: {}
steps:
  pathway-analysis-pre:
    in:
      input_file: input_file
    out:
      - loaded_project
    run: pathway-analysis-pre.cwl
  pathway-analysis-service:
    in:
      input_sequence: pathway-analysis-pre/loaded_project
      reactome_enable: reactome_enable
      gramene_enable: gramene_enable
      kegg_enable: kegg_enable
      reactome_annotation_linking: reactome_annotation_linking
      gramene_annotation_linking: gramene_annotation_linking
      kegg_annotation_linking: kegg_annotation_linking
      reactome_sequence_linking: reactome_sequence_linking
      gramene_sequence_linking: gramene_sequence_linking
      kegg_sequence_linking: kegg_sequence_linking
      reactome_most_specific: reactome_most_specific
      gramene_most_specific: gramene_most_specific
      reactome_prioritize_species: reactome_prioritize_species
      gramene_prioritize_species: gramene_prioritize_species
      reactome_priority_species: reactome_priority_species
      reactome_priority_taxa_id: reactome_priority_species_taxid
      gramene_priority_species: gramene_priority_species
      gramene_priority_taxa_id: gramene_priority_species_taxid
      reactome_categories: reactome_categories
      gramene_categories: gramene_categories
      kegg_categories: kegg_categories
    out:
      - output_project
    run: pathway-analysis-service.cwl
  pathway-analysis-post:
    in:
      input_project: pathway-analysis-service/output_project
      input_expression: input_expression
      output_project_file_name: output_project
    out:
      - output_full_project
    run: pathway-analysis-post.cwl
